name: Scrape PLACSP daily

on:
  schedule:
    # Diario a las 06:00 UTC (08:00 hora ESP en verano, 07:00 invierno)
    - cron: "0 6 * * *"
  workflow_dispatch:  # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write  # necesario para commitear la BD actualizada

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper (last 3 months)
        run: python -m scheduler.run_update --months 3

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/licitaciones.db
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): scheduled scrape $(date -u +'%Y-%m-%d')"
            git push
          fi
