name: Scrape PLACSP daily

on:
  schedule:
    # Diario a las 06:00 UTC (08:00 hora ESP en verano, 07:00 invierno)
    - cron: "0 6 * * *"
  workflow_dispatch:  # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: read  # solo lectura — ya no commiteamos la BD

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper (last 3 months)
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python -m scheduler.run_update --months 3
