name: Scrape PLACSP daily

on:
  schedule:
    # Diario a las 06:00 UTC (08:00 hora ESP en verano, 07:00 invierno)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      months:
        description: "Cuántos meses refrescar"
        default: "3"
        required: false

permissions:
  contents: read  # solo lectura — ya no commiteamos la BD

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_SMTP_USER: ${{ secrets.ALERT_SMTP_USER }}
          ALERT_SMTP_PASSWORD: ${{ secrets.ALERT_SMTP_PASSWORD }}
          ALERT_MIN_LEVEL: ${{ vars.ALERT_MIN_LEVEL || 'warn' }}
          LOG_FORMAT: json
          SCRAPER_MONTHS: ${{ inputs.months || 3 }}
        run: |
          MAX_RETRIES=2
          DELAY_SECS=90
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "=== Intento $attempt/$MAX_RETRIES ==="
            python -m scheduler.run_update --months "$SCRAPER_MONTHS" && exit 0
            echo "Intento $attempt fallido."
            if [ "$attempt" -lt "$MAX_RETRIES" ]; then
              echo "Reintentando en ${DELAY_SECS}s..."
              sleep $DELAY_SECS
            fi
          done
          echo "Todos los intentos fallaron."
          exit 1

      - name: Healthcheck post-run
        if: always()
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_SMTP_USER: ${{ secrets.ALERT_SMTP_USER }}
          ALERT_SMTP_PASSWORD: ${{ secrets.ALERT_SMTP_PASSWORD }}
          ALERT_MIN_LEVEL: ${{ vars.ALERT_MIN_LEVEL || 'warn' }}
          LOG_FORMAT: json
        run: python -m scheduler.healthcheck --alert
