name: Scrape PLACSP daily (ATOM live feed)

on:
  schedule:
    # Cada 4 horas: 02, 06, 10, 14, 18, 22 UTC
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: scrape-daily
  cancel-in-progress: false

jobs:
  scrape-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily scraper
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_SMTP_USER: ${{ secrets.ALERT_SMTP_USER }}
          ALERT_SMTP_PASSWORD: ${{ secrets.ALERT_SMTP_PASSWORD }}
          ALERT_MIN_LEVEL: ${{ vars.ALERT_MIN_LEVEL || 'warn' }}
          LOG_FORMAT: json
        run: python -m scheduler.run_update --daily
