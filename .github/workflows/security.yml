name: Security scans

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]
  schedule:
    - cron: "0 5 * * 1"  # Lunes 05:00 UTC

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config=p/ci --config=p/python --config=p/security-audit --config=p/owasp-top-ten --error --sarif --output=semgrep.sarif
        continue-on-error: true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  detect-secrets:
    name: detect-secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Audit against baseline
        run: |
          detect-secrets scan --baseline .secrets.baseline
          detect-secrets audit .secrets.baseline --report --fail-on-unaudited --fail-on-live

  secrets-rotation-reminder:
    name: Secrets rotation reminder
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Remind about credential rotation
        run: |
          echo "::notice title=Rotación de credenciales::Recuerda rotar TURSO_AUTH_TOKEN y DASHBOARD_PASSWORD cada 90 días. Última verificación: $(date -u +%Y-%m-%d). Doc: docs/SECURITY.md"
